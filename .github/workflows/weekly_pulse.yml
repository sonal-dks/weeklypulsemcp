name: groww-weekly-pulse

on:
  workflow_dispatch:
  schedule:
    # Every Monday 11:00 AM IST = 05:30 UTC
    - cron: "30 5 * * 1"

jobs:
  run:
    # Gmail MCP is NOT used here — email is sent from the UI only.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (scheduler sub-phase)
        run: bash scheduler/scripts/install_deps.sh

      - name: Install Playwright browser (Chromium)
        run: |
          python -m playwright install --with-deps chromium

      - name: Materialize Google service account key
        run: |
          KEY_PATH="${RUNNER_TEMP}/google-sa.json"
          printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > "${KEY_PATH}"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${KEY_PATH}" >> "${GITHUB_ENV}"
          echo "SERVICE_ACCOUNT_PATH=${KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Create placeholder Gmail credentials for scheduler validation
        run: |
          GMAIL_PATH="${RUNNER_TEMP}/gmail-credentials.json"
          printf '{}' > "${GMAIL_PATH}"
          echo "GMAIL_CREDENTIALS_PATH=${GMAIL_PATH}" >> "${GITHUB_ENV}"

      - name: Run weekly pipeline (scheduler sub-phase)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          DELIVERY_MODE: ${{ secrets.DELIVERY_MODE }}
          GDOCS_MCP_TRANSPORT: ${{ secrets.GDOCS_MCP_TRANSPORT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          SERVICE_ACCOUNT_PATH: ${{ env.SERVICE_ACCOUNT_PATH }}
          GMAIL_CREDENTIALS_PATH: ${{ env.GMAIL_CREDENTIALS_PATH }}
          PYTHONPATH: "."
        run: bash scheduler/scripts/run_weekly_pipeline.sh
