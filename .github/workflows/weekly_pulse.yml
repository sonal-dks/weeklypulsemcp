name: groww-weekly-pulse

on:
  workflow_dispatch:
  schedule:
    # Every Monday 11:00 AM IST = 05:30 UTC
    - cron: "30 5 * * 1"

jobs:
  run:
    # Google Docs MCP stdio requires persisted OAuth tokens at:
    #   ~/.config/google-docs-mcp/
    # Gmail MCP is NOT used here — email is sent from the UI only.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (scheduler sub-phase)
        run: bash scheduler/scripts/install_deps.sh

      - name: Run weekly pipeline (scheduler sub-phase)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          PYTHONPATH: "."
        run: bash scheduler/scripts/run_weekly_pipeline.sh
