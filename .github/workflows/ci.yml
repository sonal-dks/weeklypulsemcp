name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install phase5 delivery deps
        run: |
          pip install -r phase5_delivery/requirements.txt

      - name: Unit tests (Phase 5 doc idempotency)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m unittest phase5_delivery.tests.test_gdocs_weekly_idempotent -v
